<!DOCTYPE html><html lang="ka"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>📱 მობილური — GPC ანოტაცია (იბუპროფენი 200მგ)</title>
<style>
 body{margin:0;background:#0f172a;font-family:'Helvetica Neue',Arial,sans-serif;padding:24px 12px;color:#e2e8f0}
 .t{text-align:center;font-size:15px;margin:0 0 18px;color:#cbd5e1}
 .phone{max-width:412px;margin:0 auto;background:#000;border-radius:40px;padding:12px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
 .screen{background:#fff;border-radius:30px;overflow:hidden}
 .notch{height:26px;display:flex;align-items:center;justify-content:center}
 .notch span{width:120px;height:7px;background:#222;border-radius:6px}
 iframe{width:100%;border:0;display:block}
 .lk{text-align:center;margin-top:16px;font-size:13px}.lk a{color:#7dd3fc}
</style></head><body>
 <p class="t">📱 ასე ჩანს მობილურზე (390px სიგანე)</p>
 <div class="phone"><div class="screen"><div class="notch"><span></span></div>
   <iframe id="f" src="index.html" scrolling="no"></iframe>
 </div></div>
 <p class="lk"><a href="desktop.html">🖥 კომპიუტერის ვერსია →</a></p>
 <script>
  var f=document.getElementById('f');
  function fit(){try{f.style.height=f.contentWindow.document.body.scrollHeight+'px';}catch(e){f.style.height='2800px';}}
  f.addEventListener('load',function(){fit();setTimeout(fit,400);setTimeout(fit,1200);});
 </script>
</body></html>
